<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Golf Handicap Tracker (WHS)</title>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:20px;
  background:#f5f7f6;
}

h1{text-align:center;}

.controls{
  text-align:center;
  margin-bottom:15px;
}

button{
  padding:8px 12px;
  margin:5px;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  cursor:pointer;
}

.name{font-size:18px;font-weight:bold;}

.hcp{
  font-size:28px;
  color:#1b6b3a;
  margin:10px 0;
}

.small{font-size:13px;color:#666;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
  font-size:13px;
}

th,td{
  border-bottom:1px solid #ddd;
  padding:6px;
  text-align:center;
}

th{background:#e8f3ec;}

.view{display:none;}

canvas{
  background:#fff;
  border-radius:10px;
  padding:10px;
  max-width:100%;
}

.simBox{
  margin-top:15px;
  background:#fff;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Golf Handicap Tracker (WHS Accurate)</h1>

<div class="controls">
  <button onclick="loadData()">Refresh</button>
  <button onclick="back()">Back</button>
</div>

<div id="dashboard">
  <div class="grid" id="players"></div>

  <h2>Monthly Handicap Snapshot</h2>
  <table>
    <thead>
      <tr>
        <th>Month</th>
        <th>Player</th>
        <th>Handicap Index</th>
      </tr>
    </thead>
    <tbody id="monthly"></tbody>
  </table>
</div>

<div id="playerView" class="view">

  <h2 id="playerName"></h2>

  <canvas id="chart" height="120"></canvas>

  <div class="simBox">
    <b>What-If Simulator</b><br><br>
    <input id="simInput" placeholder="Enter score">
    <button onclick="simulate()">Run</button>
    <div id="simOut"></div>
  </div>

  <h3>Round Breakdown (WHS Logic)</h3>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Diff</th>
        <th>Used</th>
        <th>Reason</th>
        <th>Index After</th>
      </tr>
    </thead>
    <tbody id="playerRounds"></tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQQ2Pi7i-K8rOl04TxtskiyYqZ2oecFiuMsNDcTNZhDe7oTktH8y4jGRzU_xJm0N1QwTgejG1aVWvs7/pub?gid=0&single=true&output=csv";

let data=[];
let currentPlayer=null;
let chart=null;

/* ---------- CSV ---------- */
function parseCSV(t){
  const l=t.trim().split("\n");
  const h=l[0].split(",");
  return l.slice(1).map(r=>{
    const v=r.split(",");
    let o={};
    h.forEach((x,i)=>o[x.trim()] = (v[i]||"").trim());
    return o;
  });
}

const num=n=>isNaN(+n)?0:+n;

function diff(score,rating,slope){
  return ((score-rating)*113/slope);
}

/* ---------- WHS CORE ---------- */
function best8(arr){
  return [...arr].sort((a,b)=>a-b).slice(0,8);
}

function index(arr){
  if(arr.length<1) return 0;
  const use=Math.min(8,arr.length);
  const best=[...arr].sort((a,b)=>a-b).slice(0,use);
  return +(best.reduce((a,b)=>a+b,0)/best.length*0.96).toFixed(1);
}

/* ---------- MONTHLY ---------- */
function monthlySnapshot(r){

  let months={};

  r.forEach(x=>{
    let m=x.date.slice(0,7);
    if(!months[m]) months[m]=[];
    months[m].push(x.diff);
  });

  let out=[];

  Object.keys(months).sort().forEach(m=>{
    out.push({
      month:m,
      hcp:index(months[m])
    });
  });

  return out;
}

/* ---------- LOAD ---------- */
async function loadData(){

  const r=await fetch(CSV_URL);
  const t=await r.text();

  const rows=parseCSV(t);

  data=rows.map(x=>({
    player:x.Player,
    date:x.Date,
    course:x.Course,
    score:num(x.Score),
    rating:num(x.Rating),
    slope:num(x.Slope)
  }));

  data.forEach(r=>{
    r.diff=diff(r.score,r.rating,r.slope);
  });

  render();
}

/* ---------- FILTER ---------- */
function players(d){
  return [...new Set(d.map(x=>x.player))];
}

function rounds(d,p){
  return d.filter(x=>x.player===p);
}

/* ---------- DASHBOARD ---------- */
function render(){

  let div=document.getElementById("players");
  div.innerHTML="";

  players(data).forEach(p=>{

    let r=rounds(data,p);

    let h=index(r.map(x=>x.diff));

    let c=document.createElement("div");
    c.className="card";
    c.onclick=()=>openPlayer(p);

    c.innerHTML=`
      <div class="name">${p}</div>
      <div class="hcp">${h}</div>
      <div class="small">${r.length} rounds</div>
    `;

    div.appendChild(c);
  });

  renderMonthly();
}

/* ---------- MONTHLY TABLE ---------- */
function renderMonthly(){

  let tb=document.getElementById("monthly");
  tb.innerHTML="";

  players(data).forEach(p=>{

    let r=rounds(data,p).sort((a,b)=>new Date(a.date)-new Date(b.date));

    monthlySnapshot(r).forEach(m=>{
      tb.innerHTML+=`
        <tr>
          <td>${m.month}</td>
          <td>${p}</td>
          <td>${m.hcp}</td>
        </tr>
      `;
    });

  });
}

/* ---------- PLAYER ---------- */
function openPlayer(p){
  currentPlayer=p;

  document.getElementById("dashboard").style.display="none";
  document.getElementById("playerView").style.display="block";

  let r=rounds(data,p).sort((a,b)=>new Date(a.date)-new Date(b.date));

  let diffs=r.map(x=>x.diff);

  let use=Math.min(8,diffs.length);

  let best=new Set(best8(diffs));

  let labels=[],vals=[];

  document.getElementById("playerRounds").innerHTML="";

  r.forEach((x,i)=>{

    let after=index(r.slice(0,i+1).map(z=>z.diff));

    labels.push(x.date);
    vals.push(after);

    document.getElementById("playerRounds").innerHTML+=`
      <tr>
        <td>${x.date}</td>
        <td>${x.diff.toFixed(1)}</td>
        <td>${best.has(x.diff)?"YES":"NO"}</td>
        <td>${best.has(x.diff)?"Counting":"Dropped"}</td>
        <td>${after}</td>
      </tr>
    `;
  });

  draw(labels,vals);

  document.getElementById("playerName").innerText=p;
}

/* ---------- CHART ---------- */
function draw(l,d){

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:l,
      datasets:[{
        label:"Handicap Index",
        data:d,
        borderColor:"#1b6b3a",
        fill:false
      }]
    }
  });
}

/* ---------- SIM ---------- */
function simulate(){

  let v=+document.getElementById("simInput").value;
  if(!v) return;

  let r=rounds(data,currentPlayer);

  let sim=[...r,{
    diff:v
  }];

  document.getElementById("simOut").innerHTML=
    "Simulated Index: "+index(sim.map(x=>x.diff));
}

/* ---------- BACK ---------- */
function back(){
  document.getElementById("dashboard").style.display="block";
  document.getElementById("playerView").style.display="none";
}

loadData();

</script>

</body>
</html>
