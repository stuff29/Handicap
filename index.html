<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Golf Handicap Tracker</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f5f7f6;
}

h1 {
  text-align: center;
}

.controls {
  text-align: center;
  margin-bottom: 20px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.name {
  font-size: 18px;
  font-weight: bold;
}

.hcp {
  font-size: 28px;
  margin: 10px 0;
  color: #1b6b3a;
}

.small {
  color: #666;
  font-size: 13px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  font-size: 13px;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

th {
  background: #e8f3ec;
}
</style>
</head>

<body>

<h1>Golf Handicap Tracker</h1>

<div class="controls">
  <button onclick="loadData()">Refresh Data</button>
  <button onclick="setTime(null)">Live</button>
  <button onclick="setTime(prompt('Enter date YYYY-MM-DD'))">Time Machine</button>
  <span id="status"></span>
</div>

<div class="grid" id="players"></div>

<h2>All Rounds</h2>
<table>
<thead>
<tr>
  <th>Date</th>
  <th>Player</th>
  <th>Course</th>
  <th>Tee</th>
  <th>Score</th>
  <th>Diff</th>
</tr>
</thead>
<tbody id="rounds"></tbody>
</table>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQ2Pi7i-K8rOl04TxtskiyYqZ2oecFiuMsNDcTNZhDe7oTktH8y4jGRzU_xJm0N1QwTgejG1aVWvs7/pub?gid=0&single=true&output=csv";

let data = [];
let timeCursor = null;

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",");
  return lines.slice(1).map(line => {
    const values = line.split(",");
    let obj = {};
    headers.forEach((h,i)=> obj[h.trim()] = values[i]);
    return obj;
  });
}

// WHS differential
function diff(score, rating, slope) {
  return ((score - rating) * 113 / slope);
}

// WHS Handicap Rule (best 8 of last 20 with table)
function handicap(rounds) {
  if (!rounds.length) return 0;

  let sorted = [...rounds]
    .sort((a,b)=> new Date(b.date) - new Date(a.date))
    .slice(0, 20);

  let diffs = sorted.map(r => r.diff);

  let n = diffs.length;
  let count;

  if (n <= 3) count = 1;
  else if (n <= 4) count = 1;
  else if (n <= 5) count = 1;
  else if (n <= 6) count = 2;
  else if (n <= 7) count = 2;
  else if (n <= 8) count = 2;
  else if (n <= 9) count = 3;
  else if (n <= 10) count = 3;
  else if (n <= 11) count = 3;
  else if (n <= 12) count = 4;
  else if (n <= 13) count = 4;
  else if (n <= 14) count = 4;
  else if (n <= 15) count = 5;
  else if (n <= 16) count = 5;
  else if (n <= 17) count = 6;
  else if (n <= 18) count = 6;
  else if (n <= 19) count = 7;
  else count = 8;

  let best = [...diffs].sort((a,b)=>a-b).slice(0, count);

  let avg = best.reduce((a,b)=>a+b,0)/best.length;

  return (avg * 0.96).toFixed(1);
}

function setTime(date) {
  timeCursor = date ? new Date(date) : null;
  render();
}

function getFiltered() {
  if (!timeCursor) return data;
  return data.filter(r => new Date(r.date) <= timeCursor);
}

function getPlayers(list) {
  return [...new Set(list.map(d => d.player))];
}

function getRounds(list, player) {
  return list.filter(d => d.player === player);
}

async function loadData() {
  document.getElementById("status").innerText = "Loading...";

  let res = await fetch(CSV_URL);
  let text = await res.text();

  let rows = parseCSV(text);

  data = rows.map(r => ({
    player: r.Player,
    date: r.Date,
    course: r.Course,
    tee: r.Tee,
    score: +r.Score,
    rating: +r.Rating,
    slope: +r.Slope
  }));

  data.forEach(r => {
    r.diff = diff(r.score, r.rating, r.slope);
  });

  render();

  document.getElementById("status").innerText =
    "Updated: " + new Date().toLocaleTimeString();
}

function render() {

  let filtered = getFiltered();

  // PLAYER CARDS
  let playersDiv = document.getElementById("players");
  playersDiv.innerHTML = "";

  getPlayers(filtered).forEach(p => {

    let rounds = getRounds(filtered, p);
    let hcp = handicap(rounds);

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="name">${p}</div>
      <div class="hcp">${hcp}</div>
      <div class="small">${rounds.length} rounds</div>
    `;

    playersDiv.appendChild(card);
  });

  // ROUNDS TABLE
  let tbody = document.getElementById("rounds");
  tbody.innerHTML = "";

  [...filtered]
    .sort((a,b)=> new Date(a.date) - new Date(b.date))
    .forEach(r => {

      tbody.innerHTML += `
        <tr>
          <td>${r.date}</td>
          <td>${r.player}</td>
          <td>${r.course}</td>
          <td>${r.tee}</td>
          <td>${r.score}</td>
          <td>${r.diff.toFixed(1)}</td>
        </tr>
      `;
    });
}

loadData();

</script>

</body>
</html>
