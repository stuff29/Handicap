<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Golf Handicap Tracker</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f5f7f6;
}

h1 { text-align:center; }

.controls {
  text-align:center;
  margin-bottom:20px;
}

button {
  padding:8px 12px;
  margin:5px;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  cursor:pointer;
}

.name { font-size:18px; font-weight:bold; }

.hcp {
  font-size:28px;
  margin:10px 0;
  color:#1b6b3a;
}

.small { color:#666; font-size:13px; }

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  font-size:13px;
}

th,td {
  padding:6px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

th { background:#e8f3ec; }

.view { display:none; }

canvas {
  max-width:100%;
  background:white;
  border-radius:10px;
  padding:10px;
}

.explain {
  font-size:12px;
  color:#333;
  margin-top:4px;
}
</style>
</head>

<body>

<h1>Golf Handicap Tracker</h1>

<div class="controls">
  <button onclick="loadData()">Refresh Data</button>
  <button onclick="setTime(null)">Live</button>
  <button onclick="setTime(prompt('YYYY-MM-DD'))">Time Machine</button>
  <button id="backBtn" onclick="back()" style="display:none;">← Back</button>
  <span id="status"></span>
</div>

<div id="dashboard">
  <div class="grid" id="players"></div>

  <h2>All Rounds</h2>
  <table>
    <thead>
      <tr>
        <th>Date</th><th>Player</th><th>Course</th><th>Tee</th><th>Score</th><th>Diff</th>
      </tr>
    </thead>
    <tbody id="rounds"></tbody>
  </table>
</div>

<div id="playerView" class="view">
  <h2 id="playerName"></h2>
  <canvas id="chart" height="120"></canvas>

  <h3>Rounds (Full Handicap Change Intelligence)</h3>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Course</th>
        <th>Diff</th>
        <th>Used</th>
        <th>Handicap</th>
        <th>Change</th>
        <th>Replacement Insight</th>
      </tr>
    </thead>
    <tbody id="playerRounds"></tbody>
  </table>
</div>

<script>

const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQQ2Pi7i-K8rOl04TxtskiyYqZ2oecFiuMsNDcTNZhDe7oTktH8y4jGRzU_xJm0N1QwTgejG1aVWvs7/pub?gid=0&single=true&output=csv";

let data=[];
let timeCursor=null;
let chartInstance=null;

/* ---------- CSV ---------- */
function parseCSV(text){
  const lines=text.trim().split("\n");
  const headers=lines[0].split(",");
  return lines.slice(1).map(l=>{
    const v=l.split(",");
    let o={};
    headers.forEach((h,i)=>o[h.trim()]=(v[i]||"").trim());
    return o;
  });
}

function safe(n){ return isNaN(+n)?0:+n; }

/* ---------- DIFF ---------- */
function diff(score,rating,slope){
  return ((score-rating)*113/slope);
}

/* ---------- HANDICAP CORE ---------- */
function getBestSet(diffs,count){
  return [...diffs].sort((a,b)=>a-b).slice(0,count);
}

function getCount(n){
  if(n<=4) return 1;
  if(n<=8) return 2;
  if(n<=11) return 3;
  if(n<=14) return 4;
  if(n<=16) return 5;
  if(n<=18) return 6;
  if(n===19) return 7;
  return 8;
}

function handicapFromDiffs(diffs){
  if(!diffs.length) return 0;

  let count=getCount(diffs.length);
  let best=getBestSet(diffs,count);
  let avg=best.reduce((a,b)=>a+b,0)/best.length;

  return +(avg*0.96).toFixed(1);
}

/* ---------- REPLACEMENT ENGINE ---------- */
function buildTrace(rounds){

  let sorted=[...rounds].sort((a,b)=>new Date(a.date)-new Date(b.date));

  let diffs=[];
  let trace=[];

  let prevBest=[];

  sorted.forEach((r,i)=>{

    diffs.push(r.diff);

    let count=getCount(diffs.length);

    let newBest=getBestSet(diffs,count);

    let before = handicapFromDiffs(diffs.slice(0,-1));
    let after  = handicapFromDiffs(diffs);

    // find replacements
    let incoming = r.diff;
    let outgoing = null;

    if(prevBest.length>0){
      for(let x of prevBest){
        if(!newBest.includes(x)){
          outgoing=x;
          break;
        }
      }
    }

    let used = newBest.includes(incoming);

    let change = +(after-before).toFixed(2);

    trace.push({
      ...r,
      before,
      after,
      change,
      used,
      incoming,
      outgoing
    });

    prevBest=newBest;
  });

  return trace;
}

/* ---------- TIME ---------- */
function setTime(d){
  timeCursor=d?new Date(d):null;
  render();
}

function getFiltered(){
  if(!timeCursor) return data;
  return data.filter(r=>new Date(r.date)<=timeCursor);
}

/* ---------- HELPERS ---------- */
function getPlayers(list){
  return [...new Set(list.map(d=>d.player))];
}
function getRounds(list,p){
  return list.filter(d=>d.player===p);
}

/* ---------- LOAD ---------- */
async function loadData(){

  document.getElementById("status").innerText="Loading...";

  let res=await fetch(CSV_URL);
  let text=await res.text();

  let rows=parseCSV(text);

  data=rows.map(r=>({
    player:r.Player,
    date:r.Date,
    course:r.Course,
    tee:r.Tee,
    score:safe(r.Score),
    rating:safe(r.Rating),
    slope:safe(r.Slope)
  }));

  data.forEach(r=>{
    r.diff=diff(r.score,r.rating,r.slope);
  });

  render();

  document.getElementById("status").innerText=
    "Updated "+new Date().toLocaleTimeString();
}

/* ---------- PLAYER VIEW ---------- */
function openPlayer(p){

  document.getElementById("dashboard").style.display="none";
  document.getElementById("playerView").style.display="block";
  document.getElementById("backBtn").style.display="inline-block";

  document.getElementById("playerName").innerText=p;

  renderPlayer(p);
}

function back(){
  document.getElementById("dashboard").style.display="block";
  document.getElementById("playerView").style.display="none";
  document.getElementById("backBtn").style.display="none";
}

/* ---------- PLAYER RENDER ---------- */
function renderPlayer(player){

  let filtered=getFiltered()
    .filter(r=>r.player===player)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  let trace=buildTrace(filtered);

  let tbody=document.getElementById("playerRounds");
  tbody.innerHTML="";

  trace.forEach(t=>{

    let insight="";

    if(t.used && t.outgoing!==null){
      insight=`⬆ Entered counting set, replacing ${t.outgoing.toFixed(1)}`;
    } else if(!t.used){
      insight=`Not in best scores window`;
    } else {
      insight=`Stable in counting set`;
    }

    tbody.innerHTML+=`
      <tr>
        <td>${t.date}</td>
        <td>${t.course}</td>
        <td>${t.diff.toFixed(1)}</td>
        <td style="color:${t.used?'#1b6b3a':'#999'}">${t.used?'YES':'NO'}</td>
        <td>${t.after}</td>
        <td>${t.change>0?'+':''}${t.change}</td>
        <td style="font-size:12px">${insight}</td>
      </tr>
    `;
  });

  drawChart(trace);
}

/* ---------- CHART ---------- */
function drawChart(trace){

  if(chartInstance) chartInstance.destroy();

  const ctx=document.getElementById("chart");

  chartInstance=new Chart(ctx,{
    type:"line",
    data:{
      labels:trace.map(t=>t.date),
      datasets:[
        {
          label:"Handicap Index",
          data:trace.map(t=>t.after),
          borderColor:"#1b6b3a",
          fill:false
        },
        {
          label:"Used Scores",
          data:trace.map(t=>t.used?t.diff:null),
          borderColor:"#1b6b3a",
          showLine:false
        },
        {
          label:"Dropped Scores",
          data:trace.map(t=>t.used?null:t.diff),
          borderColor:"#999",
          showLine:false
        }
      ]
    }
  });
}

/* ---------- DASHBOARD ---------- */
function render(){

  let filtered=getFiltered();

  let playersDiv=document.getElementById("players");
  playersDiv.innerHTML="";

  getPlayers(filtered).forEach(p=>{

    let rounds=getRounds(filtered,p);

    let hcp=handicapFromDiffs(rounds.map(r=>r.diff));

    let card=document.createElement("div");
    card.className="card";
    card.onclick=()=>openPlayer(p);

    card.innerHTML=`
      <div class="name">${p}</div>
      <div class="hcp">${hcp}</div>
      <div class="small">${rounds.length} rounds</div>
    `;

    playersDiv.appendChild(card);
  });

  let tbody=document.getElementById("rounds");
  tbody.innerHTML="";

  filtered
    .sort((a,b)=>new Date(a.date)-new Date(b.date))
    .forEach(r=>{
      tbody.innerHTML+=`
        <tr>
          <td>${r.date}</td>
          <td>${r.player}</td>
          <td>${r.course}</td>
          <td>${r.tee}</td>
          <td>${r.score}</td>
          <td>${r.diff.toFixed(1)}</td>
        </tr>
      `;
    });
}

loadData();

</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
