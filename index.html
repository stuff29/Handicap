<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WHS Golf Handicap Tracker</title>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:20px;
  background:#f5f7f6;
}

h1{text-align:center;}

.controls{
  text-align:center;
  margin-bottom:15px;
}

button{
  padding:8px 12px;
  margin:5px;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  cursor:pointer;
}

.name{font-size:18px;font-weight:bold;}
.hcp{font-size:28px;color:#1b6b3a;margin:10px 0;}
.small{font-size:13px;color:#666;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
  font-size:13px;
}

th,td{
  border-bottom:1px solid #ddd;
  padding:6px;
  text-align:center;
}

th{background:#e8f3ec;}

.view{display:none;}

canvas{
  background:#fff;
  border-radius:10px;
  padding:10px;
  max-width:100%;
}

.simBox{
  margin-top:15px;
  background:#fff;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Golf Handicap Tracker (WHS Replica Engine)</h1>

<div class="controls">
  <button onclick="load()">Refresh</button>
  <button onclick="back()">Back</button>
</div>

<div id="dashboard">
  <div class="grid" id="players"></div>
</div>

<div id="playerView" class="view">

  <h2 id="playerName"></h2>

  <canvas id="chart" height="120"></canvas>

  <div class="simBox">
    <b>What-If Simulator</b><br><br>
    <input id="simInput" placeholder="Score">
    <button onclick="simulate()">Run</button>
    <div id="simOut"></div>
  </div>

  <h3>Round Breakdown (WHS True Recalc)</h3>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Diff</th>
        <th>Counting</th>
        <th>Index After</th>
        <th>Change Reason</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vQQ2Pi7i-K8rOl04TxtskiyYqZ2oecFiuMsNDcTNZhDe7oTktH8y4jGRzU_xJm0N1QwTgejG1aVWvs7/pub?gid=0&single=true&output=csv";

let data=[];
let current=null;
let chart=null;

/* ---------- PARSE ---------- */
function parse(t){
  const l=t.trim().split("\n");
  const h=l[0].split(",");
  return l.slice(1).map(r=>{
    const v=r.split(",");
    let o={};
    h.forEach((x,i)=>o[x.trim()]=(v[i]||"").trim());
    return o;
  });
}

const n=x=>isNaN(+x)?0:+x;

/* ---------- WHS CORE ---------- */
function index(arr){
  if(!arr.length) return 0;

  const sorted=[...arr].sort((a,b)=>a-b);

  const use=Math.min(8,sorted.length);

  const best=sorted.slice(0,use);

  return +(best.reduce((a,b)=>a+b,0)/best.length*0.96).toFixed(1);
}

function best8(arr){
  return [...arr].sort((a,b)=>a-b).slice(0,8);
}

/* ---------- LOAD ---------- */
async function load(){

  const r=await fetch(CSV);
  const t=await r.text();

  const rows=parse(t);

  data=rows.map(x=>({
    player:x.Player,
    date:x.Date,
    course:x.Course,
    score:n(x.Score),
    rating:n(x.Rating),
    slope:n(x.Slope)
  }));

  data.forEach(r=>{
    r.diff=((r.score-r.rating)*113/r.slope);
  });

  render();
}

/* ---------- GROUP ---------- */
function players(d){
  return [...new Set(d.map(x=>x.player))];
}

function rounds(d,p){
  return d.filter(x=>x.player===p)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));
}

/* ---------- DASHBOARD ---------- */
function render(){

  let div=document.getElementById("players");
  div.innerHTML="";

  players(data).forEach(p=>{

    let r=rounds(data,p);

    let h=index(r.map(x=>x.diff));

    let c=document.createElement("div");
    c.className="card";
    c.onclick=()=>open(p);

    c.innerHTML=`
      <div class="name">${p}</div>
      <div class="hcp">${h}</div>
      <div class="small">${r.length} rounds</div>
    `;

    div.appendChild(c);
  });
}

/* ---------- PLAYER VIEW ---------- */
function open(p){

  current=p;

  document.getElementById("dashboard").style.display="none";
  document.getElementById("playerView").style.display="block";

  let r=rounds(data,p);

  let out=document.getElementById("rows");
  out.innerHTML="";

  let labels=[],vals=[];

  r.forEach((x,i)=>{

    let slice=r.slice(0,i+1);

    let h=index(slice.map(z=>z.diff));

    let used=new Set(best8(slice.map(z=>z.diff)));

    labels.push(x.date);
    vals.push(h);

    out.innerHTML+=`
      <tr>
        <td>${x.date}</td>
        <td>${x.diff.toFixed(1)}</td>
        <td>${used.has(x.diff)?"YES":"NO"}</td>
        <td>${h}</td>
        <td>Recalc WHS rolling best 8</td>
      </tr>
    `;
  });

  draw(labels,vals);

  document.getElementById("playerName").innerText=p;
}

/* ---------- SIM ---------- */
function simulate(){

  let v=n(document.getElementById("simInput").value);

  let r=rounds(data,current);

  let sim=[...r,{diff:v}];

  document.getElementById("simOut").innerHTML=
    "Simulated Index: "+index(sim.map(x=>x.diff));
}

/* ---------- CHART ---------- */
function draw(l,d){

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:l,
      datasets:[{
        label:"Handicap",
        data:d,
        borderColor:"#1b6b3a",
        fill:false
      }]
    }
  });
}

/* ---------- BACK ---------- */
function back(){
  document.getElementById("dashboard").style.display="block";
  document.getElementById("playerView").style.display="none";
}

load();

</script>

</body>
</html>
