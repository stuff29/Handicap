<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Golf Handicap Tracker</title>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:20px;
  background:#f5f7f6;
}

h1{text-align:center;}

.controls{text-align:center;margin-bottom:20px;}

button{
  padding:8px 12px;
  margin:5px;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  cursor:pointer;
}

.name{font-size:18px;font-weight:bold;}

.hcp{
  font-size:28px;
  margin:10px 0;
  color:#1b6b3a;
}

.small{color:#666;font-size:13px;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  font-size:13px;
}

th,td{
  padding:6px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

th{background:#e8f3ec;}

.view{display:none;}

canvas{
  max-width:100%;
  background:#fff;
  border-radius:10px;
  padding:10px;
}

.simBox{
  margin-top:15px;
  padding:10px;
  background:#fff;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Golf Handicap Tracker</h1>

<div class="controls">
  <button onclick="loadData()">Refresh</button>
  <button onclick="setTime(null)">Live</button>
  <button onclick="setTime(prompt('YYYY-MM-DD'))">Time Machine</button>
  <button onclick="back()" id="backBtn" style="display:none;">← Back</button>
  <span id="status"></span>
</div>

<div id="dashboard">
  <div class="grid" id="players"></div>

  <h2>All Rounds</h2>
  <table>
    <thead>
      <tr>
        <th>Date</th><th>Player</th><th>Course</th><th>Tee</th><th>Score</th><th>Diff</th>
      </tr>
    </thead>
    <tbody id="rounds"></tbody>
  </table>
</div>

<div id="playerView" class="view">
  <h2 id="playerName"></h2>

  <canvas id="chart" height="120"></canvas>

  <div class="simBox">
    <b>What-If Simulator</b><br><br>
    <input id="simInput" placeholder="Enter score (e.g. 82)">
    <button onclick="runSim()">Simulate</button>
    <div id="simResult"></div>
  </div>

  <h3>Rounds</h3>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Course</th>
        <th>Diff</th>
        <th>Used</th>
        <th>Handicap</th>
        <th>Note</th>
      </tr>
    </thead>
    <tbody id="playerRounds"></tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQ2Pi7i-K8rOl04TxtskiyYqZ2oecFiuMsNDcTNZhDe7oTktH8y4jGRzU_xJm0N1QwTgejG1aVWvs7/pub?gid=0&single=true&output=csv";

let data = [];
let currentPlayer = null;
let timeCursor = null;
let chartInstance = null;

/* ---------- CSV ---------- */
function parseCSV(t){
  const l = t.trim().split("\n");
  const h = l[0].split(",");
  return l.slice(1).map(r=>{
    const v = r.split(",");
    let o = {};
    h.forEach((x,i)=>o[x.trim()] = (v[i] || "").trim());
    return o;
  });
}

function num(n){ return isNaN(+n) ? 0 : +n; }

function diff(s,r,sl){
  return ((s - r) * 113 / sl);
}

/* ---------- HANDICAP ---------- */
function count(n){
  if(n <= 4) return 1;
  if(n <= 8) return 2;
  if(n <= 11) return 3;
  if(n <= 14) return 4;
  if(n <= 16) return 5;
  if(n <= 18) return 6;
  if(n === 19) return 7;
  return 8;
}

function handicap(ds){
  if(!ds.length) return 0;

  let c = count(ds.length);
  let b = [...ds].sort((a,b)=>a-b).slice(0,c);

  return +((b.reduce((a,b)=>a+b,0)/b.length)*0.96).toFixed(1);
}

/* ---------- FILTER ---------- */
function filtered(){
  if(!timeCursor) return data;
  return data.filter(r => new Date(r.date) <= timeCursor);
}

/* ---------- HELPERS ---------- */
function getPlayers(l){
  return [...new Set(l.map(d => d.player))];
}

function getRounds(l,p){
  return l.filter(d => d.player === p);
}

/* ---------- LOAD ---------- */
async function loadData(){

  document.getElementById("status").innerText = "Loading...";

  const r = await fetch(CSV_URL);
  const t = await r.text();

  const rows = parseCSV(t);

  data = rows.map(x => ({
    player: x.Player,
    date: x.Date,
    course: x.Course,
    tee: x.Tee,
    score: num(x.Score),
    rating: num(x.Rating),
    slope: num(x.Slope)
  }));

  data.forEach(r=>{
    r.diff = diff(r.score, r.rating, r.slope);
  });

  render();
  document.getElementById("status").innerText = "Loaded";
}

/* ---------- VIEW ---------- */
function openPlayer(p){
  currentPlayer = p;
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("playerView").style.display = "block";
  document.getElementById("playerName").innerText = p;
  renderPlayer();
}

function back(){
  document.getElementById("dashboard").style.display = "block";
  document.getElementById("playerView").style.display = "none";
}

/* ---------- WHAT-IF ---------- */
function runSim(){

  const val = +document.getElementById("simInput").value;
  if(!val) return;

  const rounds = getRounds(filtered(), currentPlayer);

  const sim = [...rounds];

  const rating = sim[0]?.rating || 72;
  const slope = sim[0]?.slope || 113;

  sim.push({
    player: currentPlayer,
    date: "SIM",
    course: "What-If",
    tee: "",
    score: val,
    rating,
    slope,
    diff: diff(val, rating, slope)
  });

  const before = handicap(rounds.map(r=>r.diff));
  const after = handicap(sim.map(r=>r.diff));

  document.getElementById("simResult").innerHTML =
    `<br><b>Current:</b> ${before}
     <br><b>After:</b> ${after}
     <br><b>Change:</b> ${(after-before).toFixed(2)}`;
}

/* ---------- PLAYER ---------- */
function renderPlayer(){

  const r = getRounds(filtered(), currentPlayer)
    .sort((a,b)=>new Date(a.date) - new Date(b.date));

  const ds = r.map(x => x.diff);

  const c = count(ds.length);

  const used = new Set([...ds].sort((a,b)=>a-b).slice(0,c));

  const tb = document.getElementById("playerRounds");
  tb.innerHTML = "";

  const labels = [];
  const vals = [];

  r.forEach((x, idx)=>{

    const h = handicap(r.slice(0, idx+1).map(z=>z.diff));

    labels.push(x.date);
    vals.push(h);

    tb.innerHTML += `
      <tr>
        <td>${x.date}</td>
        <td>${x.course}</td>
        <td>${x.diff.toFixed(1)}</td>
        <td>${used.has(x.diff) ? "YES" : "NO"}</td>
        <td>${h}</td>
        <td>${used.has(x.diff) ? "Counting" : "Dropped"}</td>
      </tr>
    `;
  });

  draw(labels, vals);
}

/* ---------- CHART ---------- */
function draw(l,d){

  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: l,
      datasets: [{
        label: "Handicap",
        data: d,
        borderColor: "#1b6b3a",
        fill: false
      }]
    }
  });
}

/* ---------- DASHBOARD ---------- */
function render(){

  const f = filtered();

  const div = document.getElementById("players");
  div.innerHTML = "";

  getPlayers(f).forEach(p=>{

    const r = getRounds(f,p);

    const h = handicap(r.map(x=>x.diff));

    const c = document.createElement("div");
    c.className = "card";
    c.onclick = () => openPlayer(p);

    c.innerHTML = `
      <div class="name">${p}</div>
      <div class="hcp">${h}</div>
      <div class="small">${r.length} rounds</div>
    `;

    div.appendChild(c);
  });

  const tb = document.getElementById("rounds");
  tb.innerHTML = "";

  f.forEach(r=>{
    tb.innerHTML += `
      <tr>
        <td>${r.date}</td>
        <td>${r.player}</td>
        <td>${r.course}</td>
        <td>${r.tee}</td>
        <td>${r.score}</td>
        <td>${r.diff.toFixed(1)}</td>
      </tr>
    `;
  });
}

loadData();

</script>

</body>
</html>
