<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Golf Handicap Tracker</title>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:20px;
  background:#f5f7f6;
}

h1{text-align:center;}

.controls{text-align:center;margin-bottom:20px;}

button{
  padding:8px 12px;
  margin:5px;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  cursor:pointer;
}

.name{font-size:18px;font-weight:bold;}

.hcp{
  font-size:28px;
  margin:10px 0;
  color:#1b6b3a;
}

.small{color:#666;font-size:13px;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  font-size:13px;
}

th,td{
  padding:6px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

th{background:#e8f3ec;}

.view{display:none;}

canvas{
  max-width:100%;
  background:#fff;
  border-radius:10px;
  padding:10px;
}

.simBox{
  margin-top:15px;
  padding:10px;
  background:#fff;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Golf Handicap Tracker</h1>

<div class="controls">
  <button onclick="loadData()">Refresh</button>
  <button onclick="setTime(null)">Live</button>
  <button onclick="setTime(prompt('YYYY-MM-DD'))">Time Machine</button>
  <button onclick="back()" id="backBtn" style="display:none;">← Back</button>
  <span id="status"></span>
</div>

<div id="dashboard">
  <div class="grid" id="players"></div>

  <h2>All Rounds</h2>
  <table>
    <thead>
      <tr>
        <th>Date</th><th>Player</th><th>Course</th><th>Tee</th><th>Score</th><th>Diff</th>
      </tr>
    </thead>
    <tbody id="rounds"></tbody>
  </table>
</div>

<div id="playerView" class="view">
  <h2 id="playerName"></h2>

  <canvas id="chart" height="120"></canvas>

  <!-- 🧪 WHAT IF BOX -->
  <div class="simBox">
    <b>What-If Simulator</b><br><br>
    <input id="simInput" placeholder="Enter score (e.g. 82)">
    <button onclick="runSim()">Simulate</button>
    <div id="simResult"></div>
  </div>

  <h3>Rounds</h3>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Course</th>
        <th>Diff</th>
        <th>Used</th>
        <th>Handicap</th>
        <th>Change</th>
        <th>Note</th>
      </tr>
    </thead>
    <tbody id="playerRounds"></tbody>
  </table>
</div>

<script>

const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQQ2Pi7i-K8rOl04TxtskiyYqZ2oecFiuMsNDcTNZhDe7oTktH8y4jGRzU_xJm0N1QwTgejG1aVWvs7/pub?gid=0&single=true&output=csv";

let data=[];
let timeCursor=null;
let currentPlayer=null;
let chartInstance=null;

/* ---------- CSV ---------- */
function parseCSV(t){
  const l=t.trim().split("\n");
  const h=l[0].split(",");
  return l.slice(1).map(r=>{
    const v=r.split(",");
    let o={};
    h.forEach((x,i)=>o[x.trim()]=(v[i]||"").trim());
    return o;
  });
}

function safe(n){return isNaN(+n)?0:+n;}

function diff(s,r,sl){
  return ((s-r)*113/sl);
}

/* ---------- HANDICAP ---------- */
function count(n){
  if(n<=4) return 1;
  if(n<=8) return 2;
  if(n<=11) return 3;
  if(n<=14) return 4;
  if(n<=16) return 5;
  if(n<=18) return 6;
  if(n===19) return 7;
  return 8;
}

function hcp(d){
  if(!d.length) return 0;
  let c=count(d.length);
  let b=[...d].sort((a,b)=>a-b).slice(0,c);
  return +((b.reduce((a,b)=>a+b,0)/b.length)*0.96).toFixed(1);
}

/* ---------- WHAT IF ---------- */
function simulate(player,score){

  let rounds=getRounds(getFiltered(),player);

  let sim=[...rounds];

  // fake slope/rating assumption using avg
  let avgRating=sim.length?sim[0].rating||72:72;
  let avgSlope=sim.length?sim[0].slope||113:113;

  sim.push({
    player,
    date:"SIM",
    course:"What-If",
    tee:"",
    score:+score,
    rating:avgRating,
    slope:avgSlope,
    diff:diff(+score,avgRating,avgSlope)
  });

  let before=hcp(rounds.map(r=>r.diff));
  let after=hcp(sim.map(r=>r.diff));

  return {before,after,change:(after-before).toFixed(2)};
}

/* ---------- TIME ---------- */
function setTime(d){
  timeCursor=d?new Date(d):null;
  render();
}

function getFiltered(){
  if(!timeCursor) return data;
  return data.filter(r=>new Date(r.date)<=timeCursor);
}

/* ---------- HELPERS ---------- */
function getPlayers(l){return [...new Set(l.map(d=>d.player))];}
function getRounds(l,p){return l.filter(d=>d.player===p);}

/* ---------- LOAD ---------- */
async function loadData(){

  document.getElementById("status").innerText="Loading...";

  let r=await fetch(CSV_URL);
  let t=await r.text();

  let rows=parseCSV(t);

  data=rows.map(x=>({
    player:x.Player,
    date:x.Date,
    course:x.Course,
    tee:x.Tee,
    score:safe(x.Score),
    rating:safe(x.Rating),
    slope:safe(x.Slope)
  }));

  data.forEach(r=>{
    r.diff=diff(r.score,r.rating,r.slope);
  });

  render();

  document.getElementById("status").innerText=
    "Updated "+new Date().toLocaleTimeString();
}

/* ---------- PLAYER ---------- */
function openPlayer(p){
  currentPlayer=p;

  document.getElementById("dashboard").style.display="none";
  document.getElementById("playerView").style.display="block";
  document.getElementById("backBtn").style.display="inline-block";

  document.getElementById("playerName").innerText=p;

  renderPlayer(p);
}

function back(){
  document.getElementById("dashboard").style.display="block";
  document.getElementById("playerView").style.display="none";
  document.getElementById("backBtn").style.display="none";
}

/* ---------- SIM ---------- */
function runSim(){

  let val=document.getElementById("simInput").value;

  if(!val) return;

  let res=simulate(currentPlayer,val);

  document.getElementById("simResult").innerHTML=
    `<br><b>Current:</b> ${res.before}
     <br><b>After:</b> ${res.after}
     <br><b>Change:</b> ${res.change}`;
}

/* ---------- PLAYER VIEW ---------- */
function renderPlayer(p){

  let f=getFiltered().filter(r=>r.player===p)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  let d=f.map(x=>x.diff);

  let c=count(d.length);

  let used=new Set([...d].sort((a,b)=>a-b).slice(0,c));

  let tbody=document.getElementById("playerRounds");
  tbody.innerHTML="";

  let labels=[],vals=[];

  f.forEach(r=>{
    let isUsed=used.has(r.diff);

    let h=hcp(f.slice(0,f.indexOf(r)+1).map(x=>x.diff));

    labels.push(r.date);
    vals.push(h);

    tbody.innerHTML+=`
      <tr>
        <td>${r.date}</td>
        <td>${r.course}</td>
        <td>${r.diff.toFixed(1)}</td>
        <td style="color:${isUsed?'#1b6b3a':'#999'}">${isUsed?'YES':'NO'}</td>
        <td>${h}</td>
        <td>-</td>
        <td>${isUsed?'Counting':'Dropped'}</td>
      </tr>
    `;
  });

  drawChart(labels,vals);
}

/* ---------- CHART ---------- */
function drawChart(l,d){

  if(chartInstance) chartInstance.destroy();

  chartInstance=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:l,
      datasets:[{
        label:"Handicap",
        data:d,
        borderColor:"#1b6b3a",
        fill:false
      }]
    }
  });
}

/* ---------- DASHBOARD ---------- */
function render(){

  let f=getFiltered();

  let div=document.getElementById("players");
  div.innerHTML="";

  getPlayers(f).forEach(p=>{

    let r=getRounds(f,p);

    let h=hcp(r.map(x=>x.diff));

    let c=document.createElement("div");
    c.className="card";
    c.onclick=()=>openPlayer(p);

    c.innerHTML=`
      <div class="name">${p}</div>
      <div class="hcp">${h}</div>
      <div class="small">${r.length} rounds</div>
    `;

    div.appendChild(c);
  });

  let tb=document.getElementById("rounds");
  tb.innerHTML="";

  f.sort((a,b)=>new Date(a.date)-new Date(b.date))
    .forEach(r=>{
      tb.innerHTML+=`
        <tr>
          <td>${r.date}</td>
          <td>${r.player}</td>
          <td>${r.course}</td>
          <td>${r.tee}</td>
          <td>${r.score}</td>
          <td>${r.diff.toFixed(1)}</td>
        </tr>`;
    });
}

loadData();

</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
