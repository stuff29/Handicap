<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Golf Handicap Tracker</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f5f7f6;
}

h1 { text-align:center; }

.controls {
  text-align:center;
  margin-bottom:20px;
}

button {
  padding:8px 12px;
  margin:5px;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  cursor:pointer;
}

.name { font-size:18px; font-weight:bold; }

.hcp {
  font-size:28px;
  margin:10px 0;
  color:#1b6b3a;
}

.small { color:#666; font-size:13px; }

.diff-line {
  font-size:12px;
  margin:2px 0;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  font-size:13px;
}

th,td {
  padding:6px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

th { background:#e8f3ec; }

.view { display:none; }

canvas {
  max-width:100%;
  background:white;
  border-radius:10px;
  padding:10px;
}
</style>
</head>

<body>

<h1>Golf Handicap Tracker</h1>

<div class="controls">
  <button onclick="loadData()">Refresh Data</button>
  <button onclick="setTime(null)">Live</button>
  <button onclick="setTime(prompt('YYYY-MM-DD'))">Time Machine</button>
  <button id="backBtn" onclick="back()" style="display:none;">← Back</button>
  <span id="status"></span>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="grid" id="players"></div>

  <h2>All Rounds</h2>
  <table>
    <thead>
      <tr>
        <th>Date</th><th>Player</th><th>Course</th><th>Tee</th><th>Score</th><th>Diff</th>
      </tr>
    </thead>
    <tbody id="rounds"></tbody>
  </table>
</div>

<!-- PLAYER VIEW -->
<div id="playerView" class="view">
  <h2 id="playerName"></h2>
  <canvas id="chart" height="120"></canvas>

  <h3>Rounds</h3>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Course</th>
        <th>Score</th>
        <th>Diff</th>
        <th>Used?</th>
        <th>Handicap After</th>
      </tr>
    </thead>
    <tbody id="playerRounds"></tbody>
  </table>
</div>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQ2Pi7i-K8rOl04TxtskiyYqZ2oecFiuMsNDcTNZhDe7oTktH8y4jGRzU_xJm0N1QwTgejG1aVWvs7/pub?gid=0&single=true&output=csv";

let data=[];
let timeCursor=null;
let chartInstance=null;

/* ---------- CSV ---------- */
function parseCSV(text){
  const lines=text.trim().split("\n");
  const headers=lines[0].split(",");
  return lines.slice(1).map(l=>{
    const v=l.split(",");
    let o={};
    headers.forEach((h,i)=>o[h.trim()]=(v[i]||"").trim());
    return o;
  });
}

function safe(n){ return isNaN(+n)?0:+n; }

/* ---------- DIFFERENTIAL ---------- */
function diff(score,rating,slope){
  return ((score-rating)*113/slope);
}

/* ---------- WHS HANDICAP + MARKING ---------- */
function handicapBreakdown(rounds){

  if(!rounds.length){
    return { index:0, labels:[], usedFlags:[], series:[] };
  }

  let sorted=[...rounds]
    .sort((a,b)=>new Date(a.date)-new Date(b.date))
    .slice(-20);

  let diffs=sorted.map(r=>r.diff);

  let n=diffs.length;
  let count=1;

  if(n<=4) count=1;
  else if(n<=8) count=2;
  else if(n<=11) count=3;
  else if(n<=14) count=4;
  else if(n<=16) count=5;
  else if(n<=18) count=6;
  else if(n===19) count=7;
  else count=8;

  let sortedDiffs=[...diffs].sort((a,b)=>a-b);
  let used=new Set(sortedDiffs.slice(0,count));

  let usedArr=[];
  let droppedArr=[];
  let labels=[];
  let series=[];

  diffs.forEach((d,i)=>{
    let isUsed=false;

    // IMPORTANT: match by value + occurrence safety
    let idx=sortedDiffs.indexOf(d);
    if(idx>-1 && used.has(d)){
      isUsed=true;
      sortedDiffs.splice(idx,1);
      used.delete(d);
    }

    labels.push(sorted[i].date);

    usedArr.push(isUsed?d:null);
    droppedArr.push(isUsed?null:d);

    series.push(d);
  });

  let best=[...diffs].sort((a,b)=>a-b).slice(0,count);
  let avg=best.reduce((a,b)=>a+b,0)/best.length;

  return {
    index:+(avg*0.96).toFixed(1),
    labels,
    usedArr,
    droppedArr,
    diffs
  };
}

/* ---------- TIME ---------- */
function setTime(d){
  timeCursor=d?new Date(d):null;
  render();
}

function getFiltered(){
  if(!timeCursor) return data;
  return data.filter(r=>new Date(r.date)<=timeCursor);
}

/* ---------- HELPERS ---------- */
function getPlayers(list){
  return [...new Set(list.map(d=>d.player))];
}
function getRounds(list,p){
  return list.filter(d=>d.player===p);
}

/* ---------- LOAD ---------- */
async function loadData(){

  document.getElementById("status").innerText="Loading...";

  let res=await fetch(CSV_URL);
  let text=await res.text();

  let rows=parseCSV(text);

  data=rows.map(r=>({
    player:r.Player,
    date:r.Date,
    course:r.Course,
    tee:r.Tee,
    score:safe(r.Score),
    rating:safe(r.Rating),
    slope:safe(r.Slope)
  }));

  data.forEach(r=>{
    r.diff=diff(r.score,r.rating,r.slope);
  });

  render();

  document.getElementById("status").innerText=
    "Updated "+new Date().toLocaleTimeString();
}

/* ---------- PLAYER VIEW ---------- */
function openPlayer(p){

  document.getElementById("dashboard").style.display="none";
  document.getElementById("playerView").style.display="block";
  document.getElementById("backBtn").style.display="inline-block";

  document.getElementById("playerName").innerText=p;

  renderPlayer(p);
}

function back(){
  document.getElementById("dashboard").style.display="block";
  document.getElementById("playerView").style.display="none";
  document.getElementById("backBtn").style.display="none";
}

/* ---------- PLAYER RENDER ---------- */
function renderPlayer(player){

  let filtered=getFiltered()
    .filter(r=>r.player===player)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  let breakdown=handicapBreakdown(filtered);

  let tbody=document.getElementById("playerRounds");
  tbody.innerHTML="";

  filtered.forEach((r,i)=>{

    let isUsed=breakdown.usedArr[i]!==null;

    tbody.innerHTML+=`
      <tr>
        <td>${r.date}</td>
        <td>${r.course}</td>
        <td>${r.score}</td>
        <td>${r.diff.toFixed(1)}</td>
        <td style="color:${isUsed?'#1b6b3a':'#999'}">
          ${isUsed?'YES':'NO'}
        </td>
        <td>${breakdown.index}</td>
      </tr>
    `;
  });

  drawChart(breakdown);
}

/* ---------- CHART ---------- */
function drawChart(b){

  if(chartInstance) chartInstance.destroy();

  const ctx=document.getElementById("chart");

  chartInstance=new Chart(ctx,{
    type:"line",
    data:{
      labels:b.labels,
      datasets:[
        {
          label:"Used (Counting)",
          data:b.usedArr,
          borderColor:"#1b6b3a",
          spanGaps:true
        },
        {
          label:"Dropped",
          data:b.droppedArr,
          borderColor:"#999",
          borderDash:[5,5],
          spanGaps:true
        }
      ]
    }
  });
}

/* ---------- DASHBOARD ---------- */
function render(){

  let filtered=getFiltered();

  let playersDiv=document.getElementById("players");
  playersDiv.innerHTML="";

  getPlayers(filtered).forEach(p=>{

    let rounds=getRounds(filtered,p);
    let breakdown=handicapBreakdown(rounds);

    let card=document.createElement("div");
    card.className="card";
    card.onclick=()=>openPlayer(p);

    card.innerHTML=`
      <div class="name">${p}</div>
      <div class="hcp">${breakdown.index}</div>
      <div class="small">${rounds.length} rounds</div>
    `;

    playersDiv.appendChild(card);
  });

  let tbody=document.getElementById("rounds");
  tbody.innerHTML="";

  filtered
    .sort((a,b)=>new Date(a.date)-new Date(b.date))
    .forEach(r=>{
      tbody.innerHTML+=`
        <tr>
          <td>${r.date}</td>
          <td>${r.player}</td>
          <td>${r.course}</td>
          <td>${r.tee}</td>
          <td>${r.score}</td>
          <td>${r.diff.toFixed(1)}</td>
        </tr>
      `;
    });
}

loadData();

</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
